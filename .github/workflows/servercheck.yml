name: 🔄 Проверка серверов и обновление README.md

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  check-and-update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 📥 Получение кода
        uses: actions/checkout@v4

      - name: 🐍 Установка Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 📦 Установка httpx
        run: pip install httpx

      - name: 🚀 Проверка серверов
        run: python scripts/serverchecker.py

      - name: 📝 Апдейт README.md
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add README.md
          git diff --quiet && git diff --staged --quiet || (git commit -m "🔄 Авто-обновление README.md" && git push)
